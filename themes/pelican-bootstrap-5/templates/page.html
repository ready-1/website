{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ SITENAME }}{% endblock %}

{% block content %}
<section class="page-wrap">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <article class="page-card">
        {% if page.og_image %}
        <img src="/images/{{ page.og_image }}" class="w-100 rounded-4 my-3" alt="{{ page.title }}">
        {% endif %}
        {{ page.content }}
      </article>
    </div>
  </div>
</section>
{% endblock %}
